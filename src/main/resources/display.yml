# Per-path display and item overrides for /imgui.
#
# What this file is for:
# - Customize GUI name/lore and claimed-item metadata for specific image paths.
# - Keep defaults from config.yml when a path has no entry.
# - Use multi-language values with fallback-language support.
#
# Path rules:
# - "path" must match the image filename relative to plugins/YamipaPlugin/images.
#
# Placeholders available in name/lore:
# - {filename} / {basename}: file name without folders and without extension
# - {filepath}: full relative path in Yamipa images folder without extension
# - {amount}: stack amount of the claimed item
# - {width}, {height}: final width/height stored in Yamipa item metadata
#
# Per-entry item options (same behavior as Yamipa command arguments):
# - amount: same as <amount> in /image give (1..64)
# - width: same as <w> in /image give
# - height: same as [h] in /image give; use 0 with auto-height=true for proportional height
# - auto-height: if true and height=0, height is auto-calculated from image ratio
# - flags: same image flags model as Yamipa commands
#   - integer value (example: 7)
#   - names list/string (ANIM, REMO, DROP, GLOW)
#   - relative ops (example: +GLOW,-DROP) based on Yamipa default give flags
# - material: optional Bukkit material for the claimed item stack

